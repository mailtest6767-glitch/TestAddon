# Описание:
# - Тег релиза может иметь вид: 1.1, v1.1, v.1.1 (проверить для трех чисел) (можно добавить и другие префиксы, помимо "v" и "v." которые будут отсекаться)
# - Имя репозитория может не совпадать с именем аддона (под именем аддона здесь имеется в виду имя папки и toc-файла аддона)
# - В репозитории обязана быть папка src и в ней обязан быть один (и только один) toc-файл

# - Имя архива - это имя репозитория + символ минус + номер версии без префикса
#
#


name: Package Addon Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          # Получить имя репозитория
          REPO_NAME="${{ github.event.repository.name }}"

          # Получить имя аддона (по имени toc-файла)
          ADDON_NAME="$(basename src/*.toc .toc)"

          # Получить версию релиза (удалив из тега префиксы "v." и "v")
          RELEASE_VERSION="${{ github.ref_name }}"
          RELEASE_VERSION="${RELEASE_VERSION#v.}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"

          # Установить переменные окружения
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "ADDON_NAME=$ADDON_NAME" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      - name: Create release folder
        run: mkdir -p "$ADDON_NAME"





      - name: Process TOC file (Replace version)
        run: |
          sed "s/_RELEASE_VERSION_/${RELEASE_VERSION}/g" src/TestAddon.toc > TestAddon/TestAddon.toc

      - name: Process LUA file (Remove comments and blank lines)
        run: |
          # 1. Удаляем многострочные комментарии --[[ ... ]]
          # 2. Удаляем однострочные комментарии -- ...
          # 3. Удаляем пустые строки и строки только с пробелами
          perl -0777 -pe 's/--\[\[.*?\]\]//gs' src/TestAddon.lua | \
          sed 's/--.*$//' | \
          sed '/^[[:space:]]*$/d' > TestAddon/TestAddon.lua

      - name: Create ZIP archive
        run: |
          zip -r "TestAddon-${RELEASE_VERSION}.zip" TestAddon/

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TestAddon-${RELEASE_VERSION}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
